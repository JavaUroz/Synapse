services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: synapse-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SQLSERVER_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - synapse-net

  oracle:
    image: gvenzl/oracle-free:23-slim-faststart
    container_name: synapse-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_USER_PASSWORD}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - synapse-net

  mongo:
    image: mongo:7
    container_name: synapse-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - synapse-net

volumes:
  sqlserver_data:
  oracle_data:
  mongo_data:

networks:
  synapse-net:
    driver: bridge